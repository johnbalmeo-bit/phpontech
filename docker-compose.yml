services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phpontech_app
    ports:
      - "8081:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_USER: ${DB_USER:-root}
      DB_PASS: ${DB_PASS:-root}
      DB_NAME: ${DB_NAME:-linamnam}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: phpontech_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-root}
      MYSQL_DATABASE: ${DB_NAME:-linamnam}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
